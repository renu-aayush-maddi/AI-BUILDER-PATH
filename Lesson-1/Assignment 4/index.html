<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { margin-top: 0; color: #333; }
        .upload-section { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .upload-section input[type="file"] { margin-bottom: 10px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .chat-section { display: flex; flex-direction: column; gap: 10px; }
        #chat-window { height: 300px; border: 1px solid #ccc; border-radius: 8px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        .status { font-size: 12px; color: #666; margin-top: 5px; }
        .sources { font-size: 11px; color: #888; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Upload Knowledge Base</h2>
    <div class="upload-section">
        <input type="file" id="pdf-file" accept="application/pdf">
        <button id="upload-btn" onclick="uploadPDF()">Upload & Process PDF</button>
        <div id="upload-status" class="status"></div>
    </div>

    <h2>Chat</h2>
    <div class="chat-section">
        <div id="chat-window">
            <div class="message bot-msg">Hello! Upload a PDF above, then ask me questions about it.</div>
        </div>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:8000";

    async function uploadPDF() {
        const fileInput = document.getElementById('pdf-file');
        const statusDiv = document.getElementById('upload-status');
        const uploadBtn = document.getElementById('upload-btn');

        if (fileInput.files.length === 0) {
            statusDiv.innerText = "Please select a file first.";
            statusDiv.style.color = "red";
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append("file", file);

        statusDiv.innerText = "Uploading and processing... (this might take a moment)";
        statusDiv.style.color = "#666";
        uploadBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE_URL}/upload`, {
                method: "POST",
                body: formData
            });

            const result = await response.json();
            
            if (response.ok) {
                statusDiv.innerText = `Success! Processed ${result.chunks_processed} chunks.`;
                statusDiv.style.color = "green";
                fileInput.value = ""; 
            } else {
                statusDiv.innerText = `Error: ${result.detail}`;
                statusDiv.style.color = "red";
            }
        } catch (error) {
            statusDiv.innerText = `Connection Error: Ensure backend is running.`;
            statusDiv.style.color = "red";
        } finally {
            uploadBtn.disabled = false;
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('chat-input');
        const message = inputField.value.trim();
        if (!message) return;

        inputField.value = "";
        appendMessage(message, "user-msg");

        const typingId = "typing-" + Date.now();
        appendMessage("Thinking...", "bot-msg", typingId);

        try {
            const response = await fetch(`${API_BASE_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: message })
            });

            const result = await response.json();
            
            document.getElementById(typingId).remove();

            if (response.ok) {
                let botReply = result.answer;
                if (result.sources && result.sources.length > 0 && result.sources[0] !== "Unknown") {
                    botReply += `<div class="sources">Sources: ${result.sources.join(', ')}</div>`;
                }
                appendMessage(botReply, "bot-msg", null, true);
            } else {
                appendMessage(`Error: ${result.detail}`, "bot-msg");
            }
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage("Connection Error: Ensure backend is running.", "bot-msg");
        }
    }

    function appendMessage(text, className, id = null, isHTML = false) {
        const chatWindow = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        if (id) msgDiv.id = id;
        
        if (isHTML) {
            msgDiv.innerHTML = text;
        } else {
            msgDiv.innerText = text;
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
